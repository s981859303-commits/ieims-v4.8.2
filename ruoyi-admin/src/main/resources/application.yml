
  # 项目相关配置
ruoyi:
  # 自定义系统全称
  sysName: 电离层环境智能监测与服务系统
  # 名称
  name: 电离层监测服务
  # 版本 4.8.2
  version: 4.8.2
  # 版权年份
  copyrightYear: 2026
  # 实例演示开关
  demoEnabled: true
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ieims/uploadPath
  # 获取ip地址开关
  addressEnabled: false

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为80
  port: 80
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码错误{maxRetryCount}次锁定10分钟
    maxRetryCount: 5

  # =====================================================
  # GNSS 模块配置文件
  # =====================================================

gnss:
  # ==================== MQTT 配置 ====================
  mqtt:
    # MQTT Broker 地址
    broker: tcp://broker.emqx.io:1883
    # 订阅主题（接收 GNSS 数据）
    topic: /USR-G780s/update
    # 客户端 ID 前缀
    client-id-prefix: RuoYi_Client_
    # 用户名（可选）
    username:
    # 密码（可选）
    password:
    # 连接超时时间（秒）
    connection-timeout: 30
    # 心跳间隔（秒）
    keep-alive-interval: 60
    # 最大重连次数
    max-reconnect-attempts: 10
    # 重连延迟（毫秒）
    reconnect-delay: 5000
    # QoS 级别
    qos: 0
    #TDengine 数据推送主题
    tdengine-topic: ieims/ieims_data_topic

  # ==================== 解析器配置 ====================
  parser:
    # 缓冲区大小（字节）
    buffer-size: 1048576
    # 站点 ID
    station-id: 8900_1
    # NMEA 最大长度
    max-nmea-length: 1000
    # RTCM 最大长度
    max-rtcm-length: 1200
    # 打印间隔（毫秒）
    print-interval-ms: 950

  # ==================== TDengine 配置 ====================
  tdengine:
    # 是否启用 TDengine 直接写入
    enabled: true
    # 数据库名称
    database: ieims # gnss_test_db
    # 表名前缀
    table-prefix: gnss_
    # 驱动类名
    driver-class-name: com.taosdata.jdbc.rs.RestfulDriver
    # 连接URL
    url: jdbc:TAOS-RS://127.0.0.1:6041/gnss_test_db
    # 用户名
    username: root
    # 密码
    password: Guet@90-=

  # ==================== 录制服务配置 ====================
  recorder:
    # 是否启用录制
    enabled: false
    # 保存目录
    save-dir: ./gnss-data
    # 站点ID
    station-id: 8900_1
    # 文件后缀
    file-suffix: .bin
    # 是否按日期创建子目录
    date-subdirectory: true
    # 时区
    timezone: Asia/Shanghai
    # 录制 RTCM
    record-rtcm: true
    # 录制 NMEA
    record-nmea: true
    # 中断检测阈值（毫秒）
    interruption-threshold-ms: 5000
    # 中断告警阈值（毫秒）
    interruption-warning-ms: 30000
    # 最小磁盘空间（MB）
    min-disk-space-mb: 100

  # ==================== 异步处理配置 ====================
  async:
    queueSize: 10000
    batchSize: 100
    flushIntervalMs: 1000
    consumerThreads: 2
    backpressureThreshold: 0.8    # 队列使用率 80% 时触发背压
    backpressureWaitMs: 10        # 背压等待时间

  # ==================== NMEA 存储配置 ====================
  nmea:
    batchSize: 100

  # ==================== 数据融合配置 ====================
  fusion:
    intervalMs: 1000
    epochTimeoutMs: 2000
    cacheMaxSize: 10000

  # Spring配置
spring:
  # 导入子模块的配置文件（支持多个，用逗号分隔）
  config:
    import:
      #  相对路径（子模块需在同一个项目下，路径从resources开始）
      - classpath:/application-user-comm.yml  # 假设子模块配置文件名为 application-user-comm.yml
#  # redis 配置
#  redis:
#    # 地址
#    host: localhost
#    # 端口，默认为6379
#    port: 6379
#    # 数据库索引
#    database: 0
#    # 密码
#    password: Guet@90-=
#    #password:
#    # 连接超时时间
#    timeout: 10s
#    lettuce:
#      pool:
#        # 连接池中的最小空闲连接
#        min-idle: 0
#        # 连接池中的最大空闲连接
#        max-idle: 8
#        # 连接池的最大数据库连接数
#        max-active: 8
#        # #连接池最大阻塞等待时间（使用负值表示没有限制）
#        max-wait: -1ms
  # 模板引擎
  thymeleaf:
    mode: HTML
    encoding: utf-8
    # 禁用缓存
    cache: false
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: static/i18n/messages
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: false # 完全关闭热部署，避免 RestartClassLoader 干扰

# MyBatis
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Shiro
shiro:
  user:
    # 登录地址 ieims  login
    loginUrl: /login
    # 权限认证失败地址
    unauthorizedUrl: /unauth
    # 首页地址 index  ieims
    indexUrl: /index
    # 验证码开关  true false
    captchaEnabled: false
    # 验证码类型 math 数字计算 char 字符验证
    captchaType: char
  cookie:
    # 设置Cookie的域名 默认空，即当前访问的域名
    domain:
    # 设置cookie的有效访问路径
    path: /
    # 设置HttpOnly属性
    httpOnly: true
    # 设置Cookie的过期时间，天为单位
    maxAge: 30
    # 设置密钥，务必保持唯一性（生成方式，直接拷贝到main运行即可）Base64.encodeToString(CipherUtils.generateNewKey(128, "AES").getEncoded()) （默认启动生成随机秘钥，随机秘钥会导致之前客户端RememberMe Cookie无效，如设置固定秘钥RememberMe Cookie则有效）
    cipherKey:
  session:
    # Session超时时间，-1代表永不过期（默认30分钟）
    expireTime: 30
    # 同步session到数据库的周期（默认1分钟）
    dbSyncPeriod: 1
    # 相隔多久检查一次session的有效性，默认就是10分钟
    validationInterval: 10
    # 同一个用户最大会话数，比如2的意思是同一个账号允许最多同时两个人登录（默认-1不限制）
    maxSession: -1
    # 踢出之前登录的/之后登录的用户，默认踢出之前登录的用户
    kickoutAfter: false
  rememberMe:
    # 是否开启记住我
    enabled: true
  # ===================== 新增：Shiro拦截规则（纯yml配置放行，与user/cookie同级） =====================
  anon-paths: /ieims,/ieims-index.html,/ieims2
  # ======================================================================================================
# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice/*
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 防止csrf攻击
csrf:
  # 过滤开关
  enabled: false
  # 白名单（多个用逗号分隔）
  whites: /druid

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true

