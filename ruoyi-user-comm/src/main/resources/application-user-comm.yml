#注意：TDengine 3.x 默认使用 RESTful 接口，连接 URL 前缀应为 jdbc:TAOS-RS://，端口为 6041。
#如果服务器是原生驱动模式，URL 前缀为 jdbc:TAOS://，端口为 6030，但驱动类名仍需是 RestfulDriver。
# TDengine + Druid 配置（module1 专属）
tdengine:
  # 3.x 版本推荐使用 RESTful 连接方式
#  url: jdbc:TAOS-RS://127.0.0.1:6041/ieims?charset=utf-8&locale=en_US.UTF-8
#  driver-class-name: com.taosdata.jdbc.rs.RestfulDriver

  # 原生 JDBC URL（替换 RS 为原生驱动，端口 6030）  taos -u root -pGuet@90-= -d ieims   dbev jdbc:TAOS://127.0.0.1:6030/ieims?charset=utf-8&locale=en_US.UTF-8
  url: jdbc:TAOS://127.0.0.1:6030/ieims?charset=utf-8&locale=en_US.UTF-8
  # 原生驱动类名（适配 6030 端口）
  driver-class-name: com.taosdata.jdbc.TSDBDriver
  username: root
  password: Guet@90-=
  # Druid 连接池参数（覆盖公共模块默认值）
  druid:
    initial-size: 3        # 初始化连接数
    max-active: 15         # 最大活跃连接数
    min-idle: 3            # 最小空闲连接数
    max-wait: 30000        # 获取连接最大等待时间（ms）
    time-between-eviction-runs-millis: 60000 # 连接检测间隔
    min-evictable-idle-time-millis: 300000   # 连接最小空闲时间
    test-while-idle: true  # 空闲时检测连接
    test-on-borrow: false  # 获取连接时不检测
    test-on-return: false  # 归还连接时不检测
    validation-query: SELECT 1  # 新增：解决 testWhileIdle 警告
    validation-query-timeout: 3000  # 新增：查询超时时间

