# MQTT 启动：E:\c_prog\emqx-5.3.2-windows-amd64\bin\emqx console  停止：emqx stop   强制停止：emqx kill

mqtt:
  client:
    username: admin
    password: Guet@90-=
    broker: tcp://localhost:1883
    clientId: ieims-client-${random.value}
    defaultTopic: ieims/ieims_data_topic
    connectTimeout: 30
    keepAliveInterval: 60
    # 自动重连（生产环境必备）
    automaticReconnect: true

