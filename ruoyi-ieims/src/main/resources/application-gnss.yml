# =====================================================
# GNSS 模块配置文件
# =====================================================

gnss:
  # ==================== MQTT 配置 ====================
  mqtt:
    broker: tcp://broker.emqx.io:1883
    topic: /USR-G780s/update
    client-id-prefix: RuoYi_Client_
    username: 
    password: 
    connection-timeout: 30
    keep-alive-interval: 60
    max-reconnect-attempts: 10
    reconnect-delay: 5000
    qos: 0
    tdengine-topic: tdengine/rtcm/data

  # ==================== 解析器配置 ====================
  parser:
    buffer-size: 1048576
    station-id: 8900_1
    max-nmea-length: 1000
    max-rtcm-length: 1200
    print-interval-ms: 950

  # ==================== 录制服务配置 ====================
  recorder:
    enabled: false
    save-dir: ./gnss-data
    file-prefix: Record_
    file-suffix: .rtcm
    split-interval-hours: 1
    flush-interval: 5000
